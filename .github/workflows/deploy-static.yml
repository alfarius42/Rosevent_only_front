name: Deploy static to Masterhost

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy production static
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL || 'https://rosevent.ru' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate before deploy
        run: test -f index.html && test -d assets

      - name: Deploy via SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          REMOTE_PORT: ${{ secrets.REMOTE_PORT }}
          FRONTEND_REMOTE_PATH: ${{ secrets.FRONTEND_REMOTE_PATH }}
        run: |
          if [ -z "$SSH_PRIVATE_KEY" ] || [ -z "$REMOTE_HOST" ]; then
            echo "SSH deploy skipped (secrets not configured)"
            exit 0
          fi
          echo "SSH deploy would run to ${FRONTEND_REMOTE_PATH:-/var/www/html/}"
          echo "Configure SSH_PRIVATE_KEY, REMOTE_HOST, REMOTE_USER in repo secrets for full deploy."

      - name: Deploy via FTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_FRONTEND_PATH: ${{ secrets.FTP_FRONTEND_PATH }}
        run: |
          if [ -z "$FTP_HOST" ]; then
            echo "FTP deploy skipped (secrets not configured)"
            exit 0
          fi
          echo "FTP deploy would run to ${FTP_FRONTEND_PATH:-/public_html/}"
          echo "Configure FTP_HOST, FTP_USERNAME, FTP_PASSWORD for full deploy."

      - name: Manual deploy reminder
        run: |
          echo "No auto-deploy secrets or upload manually: see DEPLOY_INSTRUCTIONS.md"
